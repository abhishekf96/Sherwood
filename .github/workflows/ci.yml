name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/sherwood --ignore-missing-imports

      - name: Test
        run: pytest tests/ -v --cov=src/sherwood --cov-report=term-missing --cov-fail-under=80
