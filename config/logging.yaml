version: 1
disable_existing_loggers: false

formatters:
  json:
    format: "%(message)s"
  console:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: console
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    formatter: json
    filename: logs/sherwood.log
    maxBytes: 52428800
    backupCount: 5

loggers:
  sherwood:
    level: INFO
    handlers: [console, file]
    propagate: false
  alpaca_trade_api:
    level: WARNING
  websockets:
    level: WARNING

root:
  level: WARNING
  handlers: [console]
